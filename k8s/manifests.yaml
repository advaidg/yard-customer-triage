apiVersion: v1
kind: Namespace
metadata:
  name: yard-customer-triage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: yard-customer-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - image: redis:7-alpine
        name: redis
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: yard-customer-triage
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: orchestrator
    yard-system: yard-customer-triage
  name: orchestrator
  namespace: yard-customer-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        yard-system: yard-customer-triage
    spec:
      containers:
      - env:
        - name: YARD_SYSTEM_ID
          value: d55eee96-8de7-4470-979f-d24f8c562665
        - name: YARD_TRANSPORT
          value: http
        - name: YARD_REDIS_URL
          value: redis://redis:6379
        - name: YARD_ENGINE_TYPE
          value: chain_executor
        - name: YARD_OTLP_ENDPOINT
          value: http://jaeger:4318/v1/traces
        - name: YARD_ROLE
          value: in-cluster-orchestrator
        - name: YARD_SYSTEM_SPEC_PATH
          value: /etc/agentyard/system.json
        image: agentyard-engine:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: orchestrator
        ports:
        - containerPort: 8003
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /etc/agentyard
          name: yard-system-spec
          readOnly: true
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      volumes:
      - configMap:
          name: yard-system-spec
        name: yard-system-spec
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: yard-customer-triage
spec:
  ports:
  - nodePort: 30869
    port: 8003
    targetPort: 8003
  selector:
    app: orchestrator
  type: NodePort
