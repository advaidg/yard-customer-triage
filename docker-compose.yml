version: '3.8'
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
  orchestrator:
    image: agentyard/orchestrator:latest
    ports:
    - 8080:8080
    environment:
      YARD_SYSTEM_ID: d55eee96-8de7-4470-979f-d24f8c562665
      YARD_TRANSPORT: http
      YARD_REDIS_URL: redis://redis:6379
      YARD_ENGINE_TYPE: chain_executor
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      redis:
        condition: service_healthy
  triage-classifier:
    image: docker.io/advaidg/agentyard2:triage-classifier-d834f02
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: d55eee96-8de7-4470-979f-d24f8c562665
      YARD_NODE_ID: node-c79f4402
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-c79f4402
      target: /yard/config.yaml
  triage-sentiment:
    image: docker.io/advaidg/agentyard2:triage-sentiment-d834f02
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: d55eee96-8de7-4470-979f-d24f8c562665
      YARD_NODE_ID: node-96154bd7
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-96154bd7
      target: /yard/config.yaml
  triage-responder:
    image: docker.io/advaidg/agentyard2:triage-responder-d834f02
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: d55eee96-8de7-4470-979f-d24f8c562665
      YARD_NODE_ID: node-3f15cce0
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-3f15cce0
      target: /yard/config.yaml
networks:
  default:
    name: yard-customer-triage
configs:
  yard_cfg_node-c79f4402:
    file: ./yard-config-node-c79f4402.yaml
  yard_cfg_node-96154bd7:
    file: ./yard-config-node-96154bd7.yaml
  yard_cfg_node-3f15cce0:
    file: ./yard-config-node-3f15cce0.yaml
